services:
  postgres:
    image: postgres:16-alpine
    container_name: smartpay-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartpay
      POSTGRES_USER: ${DB_USER:-smartpay}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartpay} -d smartpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpay-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smartpay
      DB_USER: ${DB_USER:-smartpay}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://10.0.1.64:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      PAYSTACK_WEBHOOK_SECRET: ${PAYSTACK_WEBHOOK_SECRET}
      OZOW_SITE_CODE: ${OZOW_SITE_CODE}
      OZOW_PRIVATE_KEY: ${OZOW_PRIVATE_KEY}
      OZOW_PUBLIC_KEY: ${OZOW_PUBLIC_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://smartpay.smartintegrate.co.za}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartpay-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://smartpay.smartintegrate.co.za}
    depends_on:
      - backend

volumes:
  postgres_data:
